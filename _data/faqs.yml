- question: What types of warranties do you provide?
  answer: Surface Magic offers a 3-year warranty for rental properties and a 5-year warranty for owner-occupied properties, reflecting confidence in the durability and quality of the work.
- question: Are resurfaced bathroom and kitchen surfaces easy to clean?
  answer: Yes. Resurfaced surfaces are designed for easy maintenance and require less effort to clean than many traditional worn or porous surfaces.
- question: Do you offer color options for resurfacing?
  answer: Yes. Surface Magic provides a wide range of color options for bathroom refinishing and granite-look color options for kitchen countertop resurfacing.
- question: Is professional resurfacing different from store-bought resurfacing products?
  answer: Professional resurfacing products provide superior strength, durability, and a more polished finish compared to store-bought alternatives.
- question: Can damaged tiles be repaired?
  answer: Minor tile damage such as gouges or cracks can often be repaired. Severely broken tiles may need replacement rather than repair.
- question: Can a tub be refinished if it has been resurfaced before?
  answer: Yes. A previously resurfaced tub can often be refinished again. If the existing coating is cracked or peeling, Surface Magic may strip prior materials before applying a new finish.
- question: Do you remove the original porcelain from a tub?
  answer: No. Removing the original porcelain is unnecessary. The refinishing process applies a new surface over the existing porcelain to preserve the tub while refreshing its appearance.
