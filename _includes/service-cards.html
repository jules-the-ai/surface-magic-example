<div class="cards three">
  {% for service in site.data.services %}
  <article class="card service-card">
    <img src="{{ service.image | relative_url }}" alt="{{ service.title }} example">
    <div class="card-body"><span class="icon">{{ service.icon }}</span><h3><a href="{{ service.url | relative_url }}">{{ service.title }}</a></h3><p>{{ service.description }}</p><a class="text-link" href="{{ service.url | relative_url }}">Learn about {{ service.short_title }}</a></div>
  </article>
  {% endfor %}
</div>
